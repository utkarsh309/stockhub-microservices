services:

  # ─── Infrastructure ────────────────────────────────────────────────────

  mysql:
    image: mysql:8.0
    container_name: stockhub-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_HOST: "%"
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - stockhub-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: stockhub-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - stockhub-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: stockhub-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - stockhub-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Eureka Server ─────────────────────────────────────────────────────

  eureka-server:
    image: utkarshraj309/eureka-server:latest
    container_name: stockhub-eureka
    environment:
      SPRING_PROFILES_ACTIVE: prod
      EUREKA_HOST: eureka-server
    ports:
      - "8761:8761"
    networks:
      - stockhub-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8761/actuator/health | grep UP || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ─── Microservices ─────────────────────────────────────────────────────

  auth-service:
    image: utkarshraj309/auth-service:latest
    container_name: stockhub-auth
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: ${DB_HOST}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      EUREKA_HOST: ${EUREKA_HOST}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - stockhub-network

  product-service:
    image: utkarshraj309/product-service:latest
    container_name: stockhub-product
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: ${DB_HOST}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      EUREKA_HOST: ${EUREKA_HOST}
      REDIS_HOST: ${REDIS_HOST}
    ports:
      - "8082:8082"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - stockhub-network

  warehouse-service:
    image: utkarshraj309/warehouse-service:latest
    container_name: stockhub-warehouse
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: ${DB_HOST}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      EUREKA_HOST: ${EUREKA_HOST}
      REDIS_HOST: ${REDIS_HOST}
    ports:
      - "8083:8083"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - stockhub-network

  purchase-service:
    image: utkarshraj309/purchase-service:latest
    container_name: stockhub-purchase
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: ${DB_HOST}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      EUREKA_HOST: ${EUREKA_HOST}
    ports:
      - "8084:8084"
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - stockhub-network

  supplier-service:
    image: utkarshraj309/supplier-service:latest
    container_name: stockhub-supplier
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: ${DB_HOST}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      EUREKA_HOST: ${EUREKA_HOST}
    ports:
      - "8085:8085"
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - stockhub-network

  movement-service:
    image: utkarshraj309/movement-service:latest
    container_name: stockhub-movement
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: ${DB_HOST}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      EUREKA_HOST: ${EUREKA_HOST}
    ports:
      - "8086:8086"
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - stockhub-network

  alert-service:
    image: utkarshraj309/alert-service:latest
    container_name: stockhub-alert
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: ${DB_HOST}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      EUREKA_HOST: ${EUREKA_HOST}
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      FROM_EMAIL: ${FROM_EMAIL}
    ports:
      - "8087:8087"
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - stockhub-network

  report-service:
    image: utkarshraj309/report-service:latest
    container_name: stockhub-report
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: ${DB_HOST}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      EUREKA_HOST: ${EUREKA_HOST}
    ports:
      - "8088:8088"
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - stockhub-network

  # ─── API Gateway ───────────────────────────────────────────────────────

  api-gateway:
    image: utkarshraj309/api-gateway:latest
    container_name: stockhub-gateway
    environment:
      SPRING_PROFILES_ACTIVE: prod
      EUREKA_HOST: ${EUREKA_HOST}
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL}
      REDIS_HOST: ${REDIS_HOST}
    ports:
      - "8080:8080"
    depends_on:
      eureka-server:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - stockhub-network

# ─── Volumes ───────────────────────────────────────────────────────────────
volumes:
  mysql-data:
  rabbitmq-data:
  redis-data:

# ─── Network ───────────────────────────────────────────────────────────────
networks:
  stockhub-network:
    driver: bridge