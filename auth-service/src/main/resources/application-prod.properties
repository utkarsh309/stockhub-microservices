#server
server.port=8081
spring.application.name=auth-service

#database
spring.datasource.url=jdbc:mysql://${DB_HOST}:3306/stockhub_auth
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Admin default password — change this in prod
admin.password=${ADMIN_PASSWORD}

#jpa
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

#eureka
eureka.client.service-url.defaultZone=http://${EUREKA_HOST}:8761/eureka/
eureka.instance.prefer-ip-address=true

# Swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.show-actuator=false
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.use-root-path=true

# Logging — no security debug logs in prod
logging.level.com.stockhub=INFO
logging.level.org.springframework.security=WARN

# JWT — must match api-gateway exactly
jwt.secret=${JWT_SECRET}
jwt.expiration=28800000