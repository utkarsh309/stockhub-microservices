#server
server.port=8081
spring.application.name=auth-service

#database
spring.datasource.url=jdbc:mysql://localhost:3306/stockhub_auth
spring.datasource.username=root
spring.datasource.password=mysql
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#jpa
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

#eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# Swagger UI path
springdoc.swagger-ui.path=/swagger-ui.html
# API docs path
springdoc.api-docs.path=/v3/api-docs
# Show all endpoints including actuator
springdoc.show-actuator=false
# Sort endpoints alphabetically
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.use-root-path=true

#Logging
logging.level.com.stockhub=DEBUG
logging.level.org.springframework.security=DEBUG

# Must be at least 256 bits (32 characters)
jwt.secret=stockhub_secret_key_2026_very_long_secure_key

# 8 hours in milliseconds
# 8 * 60 * 60 * 1000 = 28800000
jwt.expiration=28800000