#server
server.port=8088
spring.application.name=report-service

#database
spring.datasource.url=jdbc:mysql://${DB_HOST}:3306/stockhub_report
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#jpa
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

#eureka
eureka.client.service-url.defaultZone=http://${EUREKA_HOST}:8761/eureka/
eureka.instance.prefer-ip-address=true

# Feign timeout settings
spring.cloud.openfeign.client.config.default.connect-timeout=5000
spring.cloud.openfeign.client.config.default.read-timeout=5000

# Swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.show-actuator=false
springdoc.swagger-ui.operations-sorter=alpha

# Logging
logging.level.com.stockhub=INFO