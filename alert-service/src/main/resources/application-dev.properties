spring.rabbitmq.password=guest

# REQUIRED: activates fallbackFactory on Feign clients
# Without this line, fallbackFactory is silently ignored
spring.cloud.openfeign.circuitbreaker.enabled=true

# Resilience4j Circuit Breaker thresholds
# slidingWindowSize=5       → look at last 5 calls to decide state
# failureRateThreshold=50   → if 50% of 5 calls fail → OPEN the circuit
# waitDurationInOpenState=10s → stay OPEN 10s, then try HALF_OPEN
# permittedCalls...=2       → allow 2 test calls in HALF_OPEN
#                             success → CLOSED again | fail → OPEN again
resilience4j.circuitbreaker.configs.default.sliding-window-size=5
resilience4j.circuitbreaker.configs.default.failure-rate-threshold=50
resilience4j.circuitbreaker.configs.default.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.configs.default.permitted-number-of-calls-in-half-open-state=2

# Actuator: see live CB state at GET /actuator/health
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
management.health.circuitbreakers.enabled=true

# Register circuit breakers for actuator health by their exact internal names
# Resilience4j names them as: <ClientName><methodName> (no separator)
resilience4j.circuitbreaker.instances.WarehouseClientgetAllWarehouses.register-health-indicator=true
resilience4j.circuitbreaker.instances.WarehouseClientgetStockByWarehouse.register-health-indicator=true
resilience4j.circuitbreaker.instances.ProductClientgetProductById.register-health-indicator=true
resilience4j.circuitbreaker.instances.AuthClientgetUsersByRole.register-health-indicator=true

# Show debug logs
logging.level.com.stockhub=DEBUG